name: BoatRace Predictor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC = 03:00 JST

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      TARGET_STADIUM_IDS: ${{ secrets.TARGET_STADIUM_IDS }}
      STADIUM_PREF_MAP: ${{ secrets.STADIUM_PREF_MAP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas requests scikit-learn scipy lightgbm
      - name: Fetch race results
        run: python fetch_boatrace.py
      - name: Run prediction
        run: python predict_boatrace.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boatrace_results.csv prediction_history.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update data [skip ci]"
          git push || echo "Nothing to push"
      - uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            prediction_result.txt
            prediction_history.csv
